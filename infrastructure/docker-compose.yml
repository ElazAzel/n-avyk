services:
  postgres:
    image: postgres:16-alpine
    container_name: navyk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: navyk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - navyk-network

  redis:
    image: redis:7-alpine
    container_name: navyk-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - navyk-network

  api:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: navyk-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/navyk
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-production
      JWT_REFRESH_SECRET: change-me-refresh-production
      CORS_ORIGINS: http://localhost:3000,https://navyk.app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - navyk-network

  web:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: navyk-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - navyk-network

  nginx:
    image: nginx:alpine
    container_name: navyk-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - navyk-network

volumes:
  postgres-data:

networks:
  navyk-network:
    driver: bridge
